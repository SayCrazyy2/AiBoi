# Copy this to ~/.ai-cli/config.yaml, or just run `ai` / `ai --setup` and let
# the interactive wizard write it for you (recommended -- it also handles
# API keys and bot tokens safely via ~/.ai-cli/.env instead of this file).
#
# API keys are NOT stored here -- set them as environment variables, or let
# the wizard save them to ~/.ai-cli/.env:
#   export ANTHROPIC_API_KEY=sk-ant-...
#   export OPENAI_API_KEY=sk-...
#   export OPENROUTER_API_KEY=sk-or-...
#   export GROQ_API_KEY=gsk_...

default_model: claude-sonnet-5

default_system_prompt: >
  You are a helpful, precise assistant running in a terminal.
  Use tools when they let you give a more accurate or up to date answer.
  Keep responses concise unless the user asks for depth.

models:
  # -- direct providers --
  claude-sonnet-5:
    provider: anthropic
    model: claude-sonnet-5
  claude-opus-4-8:
    provider: anthropic
    model: claude-opus-4-8
  claude-haiku-4-5:
    provider: anthropic
    model: claude-haiku-4-5-20251001
  gpt-4o:
    provider: openai
    model: gpt-4o
  gpt-4o-mini:
    provider: openai
    model: gpt-4o-mini
  local-llama3:
    provider: ollama
    model: llama3

  # -- third-party / OpenAI-compatible providers --
  # These all reuse the OpenAI wire format, just with a different
  # base_url + api key, so no separate client code is needed.
  groq-llama:
    provider: groq
    model: llama-3.3-70b-versatile
  openrouter-free:
    provider: openrouter
    model: meta-llama/llama-3.3-70b-instruct:free
  gemini-flash:
    provider: openai          # Gemini exposes an OpenAI-compatible endpoint
    model: gemini-2.5-flash
    base_url: https://generativelanguage.googleapis.com/v1beta/openai
    api_key_env: GEMINI_API_KEY
  my-custom-endpoint:
    provider: openai_compatible
    model: whatever-the-server-calls-it
    base_url: https://your-endpoint.example.com/v1
    api_key_env: MY_ENDPOINT_API_KEY

provider_options:
  anthropic:
    api_key_env: ANTHROPIC_API_KEY
    max_tokens: 4096
  openai:
    api_key_env: OPENAI_API_KEY
    max_tokens: 4096
  ollama:
    base_url: http://localhost:11434
  openrouter:
    api_key_env: OPENROUTER_API_KEY
    base_url: https://openrouter.ai/api/v1
    max_tokens: 4096
  groq:
    api_key_env: GROQ_API_KEY
    base_url: https://api.groq.com/openai/v1
    max_tokens: 4096
  together:
    api_key_env: TOGETHER_API_KEY
    base_url: https://api.together.xyz/v1
    max_tokens: 4096
  deepseek:
    api_key_env: DEEPSEEK_API_KEY
    base_url: https://api.deepseek.com
    max_tokens: 4096

tools:
  enable_filesystem: true
  enable_http: true
  enable_shell: false          # opt in explicitly -- runs real shell commands
  confirm_before_write: true
  confirm_before_shell: true

ui:
  stream: true
  markdown: true
  show_token_usage: true

# Bots reuse this same config file (models, tools, system prompt) --
# tokens live in ~/.ai-cli/.env, never here. Configure with:
#   ai bots setup telegram
#   ai bots setup discord
bots:
  telegram:
    enabled: false
    token_env: TELEGRAM_BOT_TOKEN
    owner_id: null            # your numeric Telegram user id; null = anyone can use owner-only commands
    allowed_chat_ids: []      # empty = respond in any chat that messages it
    model: null               # null = use default_model
  discord:
    enabled: false
    token_env: DISCORD_BOT_TOKEN
    owner_id: null
    allowed_guild_ids: []     # empty = respond in any server it's invited to
    command_prefix: "!ai "
    respond_to_mentions: true
    model: null

setup_complete: false
